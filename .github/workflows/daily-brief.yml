name: Daily Training Brief

on:
  schedule:
    - cron: '0 9 * * *'  # 9am UTC = 4am CDT
  workflow_dispatch:  # Allow manual trigger

jobs:
  brief:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run daily brief
        env:
          # Gabe's phone number (set in repo secrets)
          GABE_PHONE: ${{ secrets.GABE_PHONE }}
          # Optional: override for testing
          # DRY_RUN: true
        run: node scripts/daily-brief.js