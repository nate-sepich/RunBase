name: RunBase ETL

on:
  schedule:
    - cron: '0 */12 * * *' # Every 12 hours
  workflow_dispatch:        # Allow manual trigger

jobs:
  ingest:
    name: Ingest Strava Data
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      contents: write
    outputs:
      changed: ${{ steps.commit.outputs.changed }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ETL ingestion
        env:
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
          REPO_PAT: ${{ secrets.REPO_PAT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/ingest.js

      - name: Commit updated runs.json
        id: commit
        run: |
          git config user.name "RunBase Bot"
          git config user.email "runbase-bot@users.noreply.github.com"
          git add data/runs.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "chore(data): sync runs.json [$(date -u +%Y-%m-%dT%H:%M:%SZ)]"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

  build-and-deploy:
    name: Build & Deploy to GitHub Pages
    needs: ingest
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
      contents: read
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Pull the latest commit (including any ETL data update)
          ref: main

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro site
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
