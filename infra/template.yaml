AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: RunBase durable messaging runtime

Parameters:
  Stage:
    Type: String
    AllowedValues:
      - dev
      - prod
    Default: dev
  TelegramBotToken:
    Type: String
    NoEcho: true
  TelegramChatId:
    Type: String
  RunBaseDataBaseUrl:
    Type: String
    Default: https://raw.githubusercontent.com/nate-sepich/RunBase/main/data
  RunBaseGithubRepository:
    Type: String
    Default: nate-sepich/RunBase
  RunBaseGithubBranch:
    Type: String
    Default: main
  RunBaseGithubRunsPath:
    Type: String
    Default: data/runs.json
  RunBaseGithubWriteToken:
    Type: String
    NoEcho: true
    Default: ''
  DailyBriefScheduleExpression:
    Type: String
    Default: cron(0 9 * * ? *)
  PostRunScanScheduleExpression:
    Type: String
    Default: rate(15 minutes)
  EnableDailyBriefSchedule:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'
  EnablePostRunScanSchedule:
    Type: String
    AllowedValues: ['true', 'false']
    Default: 'true'

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 30
    MemorySize: 256
    Environment:
      Variables:
        STAGE: !Ref Stage
        TELEGRAM_BOT_TOKEN: !Ref TelegramBotToken
        TELEGRAM_CHAT_ID: !Ref TelegramChatId
        RUNBASE_DATA_BASE_URL: !Ref RunBaseDataBaseUrl
        RUNBASE_GITHUB_REPOSITORY: !Ref RunBaseGithubRepository
        RUNBASE_GITHUB_BRANCH: !Ref RunBaseGithubBranch
        RUNBASE_GITHUB_RUNS_PATH: !Ref RunBaseGithubRunsPath
        RUNBASE_GITHUB_WRITE_TOKEN: !Ref RunBaseGithubWriteToken
        MESSAGING_STATE_TABLE: !Ref MessagingStateTable

Resources:
  MessagingStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TableName: !Sub RunBaseMessagingState-${Stage}

  RunBaseHttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: !Ref Stage

  SendDailyBriefFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - infra/src/functions/sendDailyBrief.js
        Format: cjs
        Target: es2020
        Minify: true
        Sourcemap: false
    Properties:
      CodeUri: ..
      Handler: sendDailyBrief.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagingStateTable
      Events:
        DailyBrief:
          Type: Schedule
          Properties:
            Schedule: !Ref DailyBriefScheduleExpression
            Name: !Sub RunBaseDailyBrief-${Stage}
            Enabled: !Equals [!Ref EnableDailyBriefSchedule, 'true']

  ScanPostRunPromptsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - infra/src/functions/scanPostRunPrompts.js
        Format: cjs
        Target: es2020
        Minify: true
        Sourcemap: false
    Properties:
      CodeUri: ..
      Handler: scanPostRunPrompts.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagingStateTable
      Events:
        PostRunScan:
          Type: Schedule
          Properties:
            Schedule: !Ref PostRunScanScheduleExpression
            Name: !Sub RunBasePostRunScan-${Stage}
            Enabled: !Equals [!Ref EnablePostRunScanSchedule, 'true']

  HandleIncomingMessageFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        EntryPoints:
          - infra/src/functions/handleIncomingMessage.js
        Format: cjs
        Target: es2020
        Minify: true
        Sourcemap: false
    Properties:
      CodeUri: ..
      Handler: handleIncomingMessage.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref MessagingStateTable
      Events:
        TelegramWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref RunBaseHttpApi
            Path: /telegram/webhook
            Method: POST

  SendDailyBriefErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub RunBase-${Stage}-SendDailyBrief-Errors
      AlarmDescription: !Sub Alarm when SendDailyBriefFunction records Lambda errors in ${Stage}
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref SendDailyBriefFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  ScanPostRunPromptsErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub RunBase-${Stage}-ScanPostRunPrompts-Errors
      AlarmDescription: !Sub Alarm when ScanPostRunPromptsFunction records Lambda errors in ${Stage}
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScanPostRunPromptsFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

  HandleIncomingMessageErrorsAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub RunBase-${Stage}-HandleIncomingMessage-Errors
      AlarmDescription: !Sub Alarm when HandleIncomingMessageFunction records Lambda errors in ${Stage}
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref HandleIncomingMessageFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  Stage:
    Value: !Ref Stage
  MessagingStateTableName:
    Value: !Ref MessagingStateTable
  HttpApiUrl:
    Value: !Sub https://${RunBaseHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}
  TelegramWebhookUrl:
    Value: !Sub https://${RunBaseHttpApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/telegram/webhook
